<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODIN-SignUp-Form</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="section left">
        <div class="logo-grp">
            <img src="./assets/odin-logo.png" alt="" class="logo">
            <h1 class="logo-txt">ODIN</h1>
        </div>
        <p class="credit">
            Photo by 
            <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Helie west</a>
            on <a href="https://unsplash.com/">Unsplash</a>
        </p>
    </div>
    <div class="section right">
        <div class="top">
            <h3 class="title">
                This is not a real online service! You know you need something like this in you life to help you realize your deepest dreams.
                <br>Sign up <span>now</span> to get started.
            </h3>
            <h3 class="subtitle">You know you want to.</h3>
        </div>
        <div class="middle">
            <form action="#" method="post">
                <fieldset>
                    <h3>Let's do this!</h3>
                    <div class="row-1">
                        <div>
                            <label for="first-name">First name</label>
                            <input type="text" id="first-name" name="first-name" placeholder="Legal first name..." required>
                        </div>
                        <div>
                            <label for="last-name">Last name</label>
                            <input type="text" id="last-name" name="last-name" placeholder="Legal last name..." required>
                        </div>
                    </div>
                    <div class="row-2">
                        <div>
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Valid email..." required>
                        </div>
                        <div>
                            <label for="phone">Phone Number</label>
                            <input type="number" id="phone" name="phone" placeholder="Valid phone number..." pattern="\d{11}" required>
                        </div>
                    </div>
                    <div class="row-3">
                        <div>
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Valid password..." minlength="6" required>
                        </div>
                        <div>
                            <label for="c-pass">Confirm Password</label>
                            <input type="password" id="c-pass" name="c-password" placeholder="Confirm Password..." minlength="6" required>
                        </div>
                    </div>
                </fieldset>

                <div class="reg">
                    <button type="submit">Create Account</button>
                    <p class="log-in">Already have an account? <a href="#">Login</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
